# Application name used by Spring Boot for identification and logs.
spring.application.name=poo

# Default PostgreSQL connection used by the main profile.
spring.datasource.url=jdbc:postgresql://localhost:5432/poo
spring.datasource.username=postgres
spring.datasource.password=salmamp12
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Swagger UI keeps the basic-auth token between refreshes.
springdoc.swagger-ui.persistAuthorization=true

# Runs the API on port 8080.
server.port=8080
