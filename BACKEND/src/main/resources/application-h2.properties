# H2 in-memory database used for local tests or lightweight development.
spring.datasource.url=jdbc:h2:mem:training_backend;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=postgres
spring.datasource.password=salmamp12

# Hibernate recreates the schema every run so the memory database starts clean.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Enables the browser console for inspecting the H2 database.
spring.h2.console.enabled=true
